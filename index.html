<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Портфолио</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <div>
        <h1>Картографическое портфолио</h1>
        <p class="header-subtitle">Примеры работ, выполненных в QGIS</p>
      </div>
    </header>
    <main>
      <div class="container">
        <div class="map-box">
          <div class="map-card">
            <img src="images/altay-1.png" alt="Карта Алтая" />
            <a href="images/altay-1.png" target="_blank" class="btn-view"
              >Посмотреть</a
            >
          </div>
          <div class="map-card">
            <img
              src="images/european_coast1.png"
              alt="Район Европейский берег"
            />
            <a
              href="images/european_coast1.png"
              target="_blank"
              class="btn-view"
              >Посмотреть</a
            >
          </div>
          <div class="map-card">
            <img src="images/Novosib_city.png" alt="Карта районов города" />
            <a href="images/Novosib_city.png" target="_blank" class="btn-view"
              >Посмотреть</a
            >
          </div>
          <div class="map-card">
            <img src="images/school_nsk.png" alt="Карта школ" />
            <a href="images/school_nsk.png" target="_blank" class="btn-view"
              >Посмотреть</a
            >
          </div>
        </div>
      </div>
    </main>
    <footer>
      <div class="footer-content">
        <div class="footer-contacts">
          <a href="https://t.me/ElnaBT" target="_blank">Telegram</a>
          <a href="mailto:boyko.lena@gmail.com">Email</a>
        </div>
        <p>
          © 2026 Картографическое портфолио.<br class="mobile-break" />
          Все права защищены.
        </p>
      </div>
    </footer>
  </body>
</html>
